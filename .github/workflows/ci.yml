name: bootstrap-ci
on:
  pull_request:
  push:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e '.[test]'
      - run: python scripts/validate_bootstrap.py
      - run: python -m pytest
