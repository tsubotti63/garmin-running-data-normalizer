name: publish-pypi

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Full reviewed 40-character commit SHA to build
        required: true
        type: string
      expected_version:
        description: Exact package version expected in both distributions
        required: true
        type: string
      target:
        description: Package index selected by the approved publication plan
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
      perform_upload:
        description: Build-only unless Product separately approved this upload
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate exact source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
      - name: Verify immutable source selection
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "source_sha must be a full lowercase 40-character commit SHA" >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test -z "$(git status --porcelain)"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install validation tooling
        run: python -m pip install '.[test,release]'
      - name: Run synthetic regression tests
        run: python -m pytest
      - name: Build wheel and source distribution
        run: python -m build
      - name: Validate distribution metadata and README rendering
        run: python -m twine check --strict dist/*
      - name: Verify distribution version and file count
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from packaging.utils import parse_sdist_filename, parse_wheel_filename

          expected = os.environ["EXPECTED_VERSION"]
          wheels = sorted(Path("dist").glob("*.whl"))
          sdists = sorted(Path("dist").glob("*.tar.gz"))
          assert len(wheels) == 1, wheels
          assert len(sdists) == 1, sdists
          assert str(parse_wheel_filename(wheels[0].name)[1]) == expected
          assert str(parse_sdist_filename(sdists[0].name)[1]) == expected
          PY
      - name: Verify isolated wheel installation
        run: |
          python -m venv /tmp/garmin-normalizer-wheel
          /tmp/garmin-normalizer-wheel/bin/python -m pip install --no-deps dist/*.whl
          /tmp/garmin-normalizer-wheel/bin/python -m pip check
          /tmp/garmin-normalizer-wheel/bin/python -c "import importlib.metadata as m; import garmin_running_data_normalizer as p; assert m.version('garmin-running-data-normalizer') == p.__version__"
          /tmp/garmin-normalizer-wheel/bin/garmin-running-data-normalizer --version
      - name: Verify isolated source distribution installation
        run: |
          python -m venv /tmp/garmin-normalizer-sdist
          /tmp/garmin-normalizer-sdist/bin/python -m pip install --no-deps dist/*.tar.gz
          /tmp/garmin-normalizer-sdist/bin/python -m pip check
          /tmp/garmin-normalizer-sdist/bin/python -c "import importlib.metadata as m; import garmin_running_data_normalizer as p; assert m.version('garmin-running-data-normalizer') == p.__version__"
          /tmp/garmin-normalizer-sdist/bin/garmin-running-data-normalizer --version
      - name: Record candidate checksums
        run: sha256sum dist/*
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1

  approval-gate:
    name: Require explicit Product upload enablement
    if: ${{ inputs.perform_upload }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Verify target-specific approval variable
        env:
          TARGET: ${{ inputs.target }}
          WORKFLOW_GIT_REF: ${{ github.ref }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          PYPI_APPROVED: ${{ vars.PYPI_PUBLISH_APPROVED }}
          TESTPYPI_APPROVED: ${{ vars.TESTPYPI_PUBLISH_APPROVED }}
        run: |
          test "$WORKFLOW_GIT_REF" = "refs/heads/main"
          test "$WORKFLOW_REF" = "tsubotti63/garmin-running-data-normalizer/.github/workflows/publish-pypi.yml@refs/heads/main"
          case "$TARGET" in
            pypi)
              test "$PYPI_APPROVED" = "true"
              ;;
            testpypi)
              test "$TESTPYPI_APPROVED" = "true"
              ;;
            *)
              exit 1
              ;;
          esac || {
            echo "The target-specific Product approval variable is not enabled." >&2
            exit 1
          }

  publish-testpypi:
    name: Publish to TestPyPI
    if: ${{ inputs.perform_upload && inputs.target == 'testpypi' }}
    needs:
      - build
      - approval-gate
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/garmin-running-data-normalizer
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    name: Verify TestPyPI publication
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install and exercise the exact TestPyPI version
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            python -m pip install --no-cache-dir --no-deps \
              --index-url https://test.pypi.org/simple/ \
              "garmin-running-data-normalizer==$EXPECTED_VERSION" && break
            test "$attempt" != 6
            sleep 10
          done
          python -c "import importlib.metadata as m; import garmin_running_data_normalizer as p; assert m.version('garmin-running-data-normalizer') == p.__version__"
          garmin-running-data-normalizer --version

  publish-pypi:
    name: Publish to PyPI
    if: ${{ inputs.perform_upload && inputs.target == 'pypi' }}
    needs:
      - build
      - approval-gate
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/garmin-running-data-normalizer
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1

  verify-pypi:
    name: Verify PyPI publication
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install and exercise the exact PyPI version
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            python -m pip install --no-cache-dir --no-deps \
              "garmin-running-data-normalizer==$EXPECTED_VERSION" && break
            test "$attempt" != 6
            sleep 10
          done
          python -c "import importlib.metadata as m; import garmin_running_data_normalizer as p; assert m.version('garmin-running-data-normalizer') == p.__version__"
          garmin-running-data-normalizer --version
